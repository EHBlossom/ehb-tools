<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界探究学習ランチャー | EHB Global Learning</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;}
.header{background:#1D9E75;color:#fff;padding:20px 24px;}
.header h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.header p{font-size:13px;opacity:.85;}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;background:#E1F5EE;color:#085041;font-weight:600;margin-top:8px;}
.container{max-width:720px;margin:0 auto;padding:20px 16px;}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.sec{font-size:15px;font-weight:600;margin-bottom:10px;}
.sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:10px;}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:12px;}
.theme-card{border:1.5px solid #e8e6e0;border-radius:12px;padding:18px 12px;cursor:pointer;background:#f8f7f4;text-align:center;transition:all .15s;}
.theme-card:hover{background:#fff;border-color:#1D9E75;transform:translateY(-2px);}
.theme-card.sel{border:2px solid #1D9E75;background:#E1F5EE;}
.theme-icon{font-size:32px;margin-bottom:8px;}
.theme-en{font-size:14px;font-weight:700;color:#1a1a1a;}
.theme-ja{font-size:12px;color:#666;margin-top:3px;}
.step-area{display:none;}
.step-area.on{display:block;}
.step-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.stab{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#f8f7f4;font-size:13px;cursor:pointer;color:#666;transition:all .12s;}
.stab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.stab.done{background:#E1F5EE;color:#085041;border-color:#0F6E56;}
.step-content{display:none;}
.step-content.active{display:block;}
.q-list{list-style:none;}
.q-list li{padding:9px 0;border-bottom:1px solid #f0ede8;font-size:14px;display:flex;gap:8px;line-height:1.5;}
.q-list li:last-child{border-bottom:none;}
.qnum{font-size:11px;font-weight:700;color:#1D9E75;min-width:16px;margin-top:2px;}
textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;background:#f8f7f4;font-size:14px;resize:vertical;min-height:70px;font-family:inherit;margin-top:6px;}
.btn{padding:9px 20px;border-radius:8px;border:1px solid #ddd;background:#f8f7f4;font-size:14px;cursor:pointer;margin-top:12px;margin-right:8px;transition:all .12s;}
.btn.pri{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.btn:hover:not(.pri){background:#fff;}
.lang-box{border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.65;margin-bottom:8px;}
.lang-en{background:#E1F5EE;color:#085041;}
.lang-ja{background:#FAEEDA;color:#633806;}
.lang-lbl{font-size:10px;font-weight:700;margin-bottom:4px;opacity:.75;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chip{display:inline-block;font-size:12px;padding:6px 13px;border-radius:20px;border:1px solid #ddd;background:#f8f7f4;color:#666;cursor:pointer;margin:3px;transition:all .12s;}
.chip:hover{background:#fff;}
.chip.on{background:#E1F5EE;color:#085041;border-color:#1D9E75;}
.stance-btn{display:block;width:100%;padding:11px 14px;border-radius:8px;border:1px solid #ddd;background:#f8f7f4;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:8px;}
.stance-btn:hover{background:#fff;border-color:#BA7517;}
.stance-btn.chosen{background:#FAEEDA;border:2px solid #BA7517;color:#633806;font-weight:600;}
.pbox{background:#f8f7f4;border-radius:8px;padding:12px 14px;font-size:13px;color:#666;line-height:1.7;margin-top:10px;min-height:52px;border:1px solid #e8e6e0;}
.summary-box{background:#EEEDFE;border-radius:10px;padding:14px 18px;margin-top:14px;}
.teach-box{background:#E1F5EE;border-radius:10px;padding:14px 18px;margin-top:12px;font-size:13px;color:#085041;line-height:1.7;}
@media(max-width:600px){.two-col{grid-template-columns:1fr;}.theme-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="header">
  <h1>世界探究学習ランチャー</h1>
  <p>Global Inquiry Launcher | English House Blossom</p>
  <span class="badge">探究力 · 批判的思考 · 世界視野</span>
</div>
<div class="container">

<div class="card" id="theme-picker">
  <p class="sec">今日探究するテーマを選ぼう</p>
  <p class="sub">Choose your inquiry theme — カードをタップしてスタート！</p>
  <div class="theme-grid">
    <div class="theme-card" onclick="pickTheme(0)">
      <div class="theme-icon">&#128167;</div>
      <div class="theme-en">Water &amp; Life</div>
      <div class="theme-ja">水と生命</div>
    </div>
    <div class="theme-card" onclick="pickTheme(1)">
      <div class="theme-icon">&#127807;</div>
      <div class="theme-en">Climate &amp; Food</div>
      <div class="theme-ja">気候と食料</div>
    </div>
    <div class="theme-card" onclick="pickTheme(2)">
      <div class="theme-icon">&#129302;</div>
      <div class="theme-en">AI &amp; Society</div>
      <div class="theme-ja">AIと社会</div>
    </div>
    <div class="theme-card" onclick="pickTheme(3)">
      <div class="theme-icon">&#9878;&#65039;</div>
      <div class="theme-en">Equality &amp; Rights</div>
      <div class="theme-ja">平等と権利</div>
    </div>
    <div class="theme-card" onclick="pickTheme(4)">
      <div class="theme-icon">&#10084;&#65039;</div>
      <div class="theme-en">Health &amp; Wellbeing</div>
      <div class="theme-ja">健康と幸福</div>
    </div>
    <div class="theme-card" onclick="pickTheme(5)">
      <div class="theme-icon">&#127970;</div>
      <div class="theme-en">Cities &amp; Future</div>
      <div class="theme-ja">都市と未来</div>
    </div>
  </div>
</div>

<div class="step-area" id="step-area">
  <div class="card" style="padding:14px 18px;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span id="chosen-icon" style="font-size:24px;"></span>
      <span id="chosen-label" style="font-size:16px;font-weight:700;"></span>
      <button onclick="resetTheme()" style="margin-left:auto;font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#f8f7f4;color:#666;cursor:pointer;">テーマを変える</button>
    </div>
    <div class="step-tabs" id="step-tabs"></div>
  </div>
  <div id="step-contents"></div>
</div>

</div>
<script>
var themes = [
  {
    icon:"&#128167;", en:"Water & Life", ja:"水と生命",
    qs:[
      "Why do 2 billion people still lack safe drinking water in 2025?",
      "How might technology help us make seawater drinkable?",
      "What if your town ran out of water for one week?"
    ],
    stances:[
      "Technology will solve it / 技術で解決できる",
      "We need behavior change / 行動を変えるべき",
      "It is a political problem / 政治の問題だ",
      "I am not sure yet / まだわからない"
    ],
    subjects:{
      "理科 Science":"Water cycle, filtration, evaporation — how climate change threatens water supplies.",
      "数学 Math":"Population vs water supply ratios. Graph trends to predict future scarcity.",
      "地理 Geography":"Which regions face water scarcity and why? Map the water-stressed zones.",
      "倫理 Ethics":"Is water a human right? Who should own rivers and lakes?",
      "英語 English":"Read WHO water reports. Practice summarizing in your own words."
    },
    sdgs:{
      "SDG 6 — Clean water":"26% of the world lacks safe drinking water (WHO 2023). SDG6 aims to fix this by 2030.",
      "SDG 13 — Climate action":"Droughts and floods caused by climate change directly threaten water supplies worldwide.",
      "SDG 3 — Good health":"Contaminated water causes 1.4 million deaths per year, mostly children under 5."
    }
  },
  {
    icon:"&#127807;", en:"Climate & Food", ja:"気候と食料",
    qs:[
      "Why are food prices rising around the world?",
      "How might Japan's food supply change if the climate gets 2 degrees hotter?",
      "What if we had to grow our own food in our town?"
    ],
    stances:[
      "Individuals must change diets / 個人の食生活を変えるべき",
      "Farming technology must change / 農業技術を革新すべき",
      "Global trade policy is key / 国際政策が重要",
      "All of the above / 全部必要だ"
    ],
    subjects:{
      "理科 Science":"Photosynthesis, soil health, ecosystems — how temperature changes affect crops.",
      "数学 Math":"Japan's food self-sufficiency rate is 38%. What does that mean in a crisis?",
      "地理 Geography":"Which countries export food? Which import? What happens when supply chains break?",
      "社会 Social Studies":"History of famines. How government policy shapes what farmers grow.",
      "英語 English":"Read IPCC food security reports. Debate: Should everyone eat less meat?"
    },
    sdgs:{
      "SDG 2 — Zero hunger":"815 million people are chronically hungry. Climate change could push 100 million more into poverty.",
      "SDG 13 — Climate action":"Extreme weather events destroyed 280 billion dollars in crops globally in 2022.",
      "SDG 15 — Life on land":"40% of the world's agricultural land has been degraded by industrial farming."
    }
  },
  {
    icon:"&#129302;", en:"AI & Society", ja:"AIと社会",
    qs:[
      "Who decides what AI is allowed to do?",
      "How might AI change what skills humans need in 20 years?",
      "What if AI could grade every student's work — would that be fair?"
    ],
    stances:[
      "AI will mostly help society / AIは社会を良くする",
      "AI poses serious risks / AIは深刻なリスクがある",
      "It depends on who controls it / 誰がコントロールするかによる",
      "We need completely new rules / 全く新しいルールが必要"
    ],
    subjects:{
      "数学 Math":"Probability and statistics — what AI is actually doing when it makes predictions.",
      "理科 Science":"Neuroscience: how human brains and machine learning differ fundamentally.",
      "倫理 Ethics":"Bias in AI systems. Who is responsible when AI makes a harmful decision?",
      "英語 English":"Read tech news in English. Write a persuasive essay on AI regulation.",
      "美術 Art":"AI-generated art — is it creative? What does creativity even mean?"
    },
    sdgs:{
      "SDG 4 — Quality education":"AI tutors could personalize learning for 300 million students who lack good teachers.",
      "SDG 8 — Decent work":"Up to 30% of jobs may be automated by 2030 (McKinsey). New kinds of work will emerge.",
      "SDG 10 — Reduced inequalities":"AI tools are not equally accessible — the digital divide may widen global inequality."
    }
  },
  {
    icon:"&#9878;&#65039;", en:"Equality & Rights", ja:"平等と権利",
    qs:[
      "Why do people in different countries have such different rights?",
      "How might Japan become more welcoming to people from other cultures?",
      "What if you were born in a country where you could not go to school?"
    ],
    stances:[
      "Universal rights must come first / 普遍的人権が最優先",
      "Cultural context matters too / 文化的背景も重要",
      "Economic development unlocks rights / 経済発展が権利を生む",
      "Young people must lead change / 若者がリードすべき"
    ],
    subjects:{
      "社会 Social Studies":"History of human rights movements. UN Declaration of Human Rights (1948).",
      "英語 English":"Read speeches by Malala and Greta Thunberg. Write your own rights manifesto.",
      "倫理 Ethics":"What is fairness? Explore different theories of justice.",
      "数学 Math":"Gender pay gap data. Representation statistics in government and leadership.",
      "国語 Literature":"Stories from other cultures — building empathy through fiction and narrative."
    },
    sdgs:{
      "SDG 5 — Gender equality":"Women earn on average 20% less than men globally. Legal gaps still exist in 49 countries.",
      "SDG 10 — Reduced inequalities":"The richest 10% own 76% of global wealth (Credit Suisse 2023).",
      "SDG 16 — Peace and justice":"Over 100 million people are currently displaced by conflict or persecution."
    }
  },
  {
    icon:"&#10084;&#65039;", en:"Health & Wellbeing", ja:"健康と幸福",
    qs:[
      "Why do people in some countries live 30 years longer than others?",
      "How might mental health become the biggest health challenge for teenagers?",
      "What if all medical care were free everywhere in the world?"
    ],
    stances:[
      "Healthcare is a human right / 医療は人権だ",
      "Lifestyle choices are key / 生活習慣が最重要",
      "Prevention is better than treatment / 予防が治療より重要",
      "Community and connection matter most / コミュニティが最重要"
    ],
    subjects:{
      "理科 Science":"Body systems, nutrition, disease prevention. What does healthy actually mean?",
      "数学 Math":"Life expectancy data by country. Calculating and comparing disease rates.",
      "社会 Social Studies":"Healthcare systems — Japan, UK, US, and developing nations compared.",
      "英語 English":"Read WHO reports. Debate: Does social media harm teenage mental health?",
      "保健体育 PE":"Physical activity guidelines — the science behind why exercise is medicine."
    },
    sdgs:{
      "SDG 3 — Good health":"Japan's average life expectancy is 84. In some countries it is below 60 — mostly preventable.",
      "SDG 1 — No poverty":"Poor families spend up to 40% of income on healthcare, creating a vicious cycle.",
      "SDG 10 — Reduced inequalities":"Healthcare deserts affect rural areas — including parts of Kumamoto Prefecture."
    }
  },
  {
    icon:"&#127970;", en:"Cities & Future", ja:"都市と未来",
    qs:[
      "How might Kumamoto change in 20 years with TSMC and global companies moving in?",
      "What should a city designed by teenagers look like?",
      "Why do more than half of all humans now live in cities?"
    ],
    stances:[
      "Technology will make cities smarter / テクノロジーが都市を変える",
      "Nature must be at the center / 自然との共存が最重要",
      "Communities need to lead / コミュニティ主導が必要",
      "Old and new must blend / 伝統と革新のバランス"
    ],
    subjects:{
      "地理 Geography":"Urbanization trends worldwide. Smart city examples — Singapore, Tokyo, Amsterdam.",
      "数学 Math":"Population density calculations. Infrastructure cost planning for growing cities.",
      "理科 Science":"Urban heat islands. How cities can use renewable energy effectively.",
      "美術 Art":"Urban design — how the shape and layout of a city changes how people feel.",
      "英語 English":"Read city planning proposals. Write your own proposal for an ideal Kumamoto."
    },
    sdgs:{
      "SDG 11 — Sustainable cities":"68% of the world will live in cities by 2050. Cities produce 70% of global CO2.",
      "SDG 13 — Climate action":"Flooding of coastal cities is a top climate risk — including parts of Kyushu.",
      "SDG 9 — Industry and innovation":"Kumamoto's semiconductor boom is a real example of how global industry reshapes a region."
    }
  }
];

var stepLabels = ["問いを立てる","教科横断","スタンス","SDGs","アクション"];
var curTheme = null;
var curStep = 0;
var selStanceVal = null;
var selSdgVal = null;

function pickTheme(i) {
  curTheme = i;
  var t = themes[i];
  document.getElementById("theme-picker").style.display = "none";
  document.getElementById("step-area").classList.add("on");
  document.getElementById("chosen-icon").innerHTML = t.icon;
  document.getElementById("chosen-label").textContent = t.en + " — " + t.ja;
  buildTabs();
  buildStepContent(t);
  goStep(0);
}

function resetTheme() {
  document.getElementById("theme-picker").style.display = "block";
  document.getElementById("step-area").classList.remove("on");
  curTheme = null;
  selStanceVal = null;
  selSdgVal = null;
}

function buildTabs() {
  var tabs = document.getElementById("step-tabs");
  tabs.innerHTML = "";
  stepLabels.forEach(function(l, i) {
    var b = document.createElement("button");
    b.className = "stab" + (i === 0 ? " active" : "");
    b.textContent = (i + 1) + ". " + l;
    b.setAttribute("data-step", i);
    b.onclick = function() { goStep(i); };
    tabs.appendChild(b);
  });
}

function goStep(n) {
  curStep = n;
  document.querySelectorAll(".stab").forEach(function(b, i) {
    b.className = "stab" + (i === n ? " active" : i < n ? " done" : "");
  });
  document.querySelectorAll(".step-content").forEach(function(s, i) {
    s.style.display = (i === n) ? "block" : "none";
  });
  if (n === 4) buildSummary();
  window.scrollTo(0, 0);
}

function buildStepContent(t) {
  var c = document.getElementById("step-contents");
  c.innerHTML = "";

  // STEP 0 — 問いを立てる
  var s0 = document.createElement("div");
  s0.className = "step-content card";
  s0.style.display = "block";
  var qHTML = t.qs.map(function(q, i) {
    return "<li><span class=\"qnum\">" + (i+1) + "</span><span>" + q + "</span></li>";
  }).join("");
  s0.innerHTML = "<p class=\"sec\">STEP 1 — 問いを立てる / Raise a question</p>" +
    "<p class=\"sub\">このテーマについて「なぜ?」「どうすれば?」で始まる問いを作ろう。正解はない — 自分の言葉で。</p>" +
    "<ul class=\"q-list\">" + qHTML + "</ul>" +
    "<p style=\"font-size:12px;color:#888;margin-top:12px;\">自分の問い / My own question :</p>" +
    "<textarea id=\"my-q\" placeholder=\"Why does... / How might we... / What if...\"></textarea>" +
    "<div style=\"margin-top:14px;\"><button class=\"btn pri\" onclick=\"goStep(1)\">次へ — STEP 2 &#8594;</button></div>";
  c.appendChild(s0);

  // STEP 1 — 教科横断
  var s1 = document.createElement("div");
  s1.className = "step-content card";
  s1.style.display = "none";
  var subKeys = Object.keys(t.subjects);
  var subHTML = subKeys.map(function(k) {
    return "<span class=\"chip\" onclick=\"selSub(this)\" data-val=\"" + encodeURIComponent(t.subjects[k]) + "\">" + k + "</span>";
  }).join("");
  s1.innerHTML = "<p class=\"sec\">STEP 2 — 教科を横断する / Cross-subject lens</p>" +
    "<p class=\"sub\">このテーマはどの教科の視点で見ると深まる? タップして確認しよう。</p>" +
    "<div style=\"margin-bottom:8px;\">" + subHTML + "</div>" +
    "<div id=\"sub-explain\" class=\"pbox\">教科をタップすると、その視点からの問いと気づきが表示されます。</div>" +
    "<p style=\"font-size:12px;color:#888;margin-top:12px;\">気づきを書こう / Write your insight :</p>" +
    "<textarea placeholder=\"この教科の視点から見ると...  /  From this subject perspective...\"></textarea>" +
    "<div style=\"margin-top:14px;\"><button class=\"btn pri\" onclick=\"goStep(2)\">次へ — STEP 3 &#8594;</button><button class=\"btn\" onclick=\"goStep(0)\">&larr; 戻る</button></div>";
  c.appendChild(s1);

  // STEP 2 — スタンス
  var s2 = document.createElement("div");
  s2.className = "step-content card";
  s2.style.display = "none";
  var stHTML = t.stances.map(function(s) {
    return "<button class=\"stance-btn\" onclick=\"selStance(this)\" data-val=\"" + s + "\">" + s + "</button>";
  }).join("");
  s2.innerHTML = "<p class=\"sec\">STEP 3 — スタンスをとる / Take a stance</p>" +
    "<p class=\"sub\">この問いに対する今の自分の考えは? 後で変えてOK — まず直感で選ぼう。</p>" +
    stHTML +
    "<div id=\"stance-exp\" class=\"pbox\">スタンスを選んでください。どれも正解です。</div>" +
    "<p style=\"font-size:12px;color:#888;margin-top:12px;\">なぜそう思う? / Why do you think so?</p>" +
    "<textarea id=\"stance-reason\" placeholder=\"English or Japanese OK — 自分の言葉で\"></textarea>" +
    "<div style=\"margin-top:14px;\"><button class=\"btn pri\" onclick=\"goStep(3)\">次へ — STEP 4 &#8594;</button><button class=\"btn\" onclick=\"goStep(1)\">&larr; 戻る</button></div>";
  c.appendChild(s2);

  // STEP 3 — SDGs
  var s3 = document.createElement("div");
  s3.className = "step-content card";
  s3.style.display = "none";
  var sdgKeys = Object.keys(t.sdgs);
  var sdgHTML = sdgKeys.map(function(k) {
    return "<span class=\"chip\" onclick=\"selSDG(this)\" data-val=\"" + encodeURIComponent(t.sdgs[k]) + "\">" + k + "</span>";
  }).join("");
  s3.innerHTML = "<p class=\"sec\">STEP 4 — 世界とつながる / SDGs connection</p>" +
    "<p class=\"sub\">このテーマは世界のどの目標と関係している? タップして具体的なデータを確認しよう。</p>" +
    "<div style=\"margin-bottom:8px;\">" + sdgHTML + "</div>" +
    "<div id=\"sdg-exp\" class=\"pbox\">SDGをタップすると、世界の具体的なデータが表示されます。</div>" +
    "<div class=\"two-col\" style=\"margin-top:14px;\">" +
    "<div><div class=\"lang-box lang-en\"><div class=\"lang-lbl\">In English</div>How does this connect to the world?</div><textarea placeholder=\"This connects to the world because...\"></textarea></div>" +
    "<div><div class=\"lang-box lang-ja\"><div class=\"lang-lbl\">日本語で</div>世界とどうつながっている?</div><textarea placeholder=\"世界とのつながりは...\"></textarea></div>" +
    "</div>" +
    "<div style=\"margin-top:14px;\"><button class=\"btn pri\" onclick=\"goStep(4)\">次へ — STEP 5 &#8594;</button><button class=\"btn\" onclick=\"goStep(2)\">&larr; 戻る</button></div>";
  c.appendChild(s3);

  // STEP 4 — アクション
  var s4 = document.createElement("div");
  s4.className = "step-content card";
  s4.style.display = "none";
  s4.innerHTML = "<p class=\"sec\">STEP 5 — アクションを考える / My action plan</p>" +
    "<p class=\"sub\">探究した結果、自分にできることは? 中学生としての小さな一歩でいい。</p>" +
    "<div class=\"two-col\">" +
    "<div><div class=\"lang-box lang-en\"><div class=\"lang-lbl\">What can I do?</div>Think of 1-2 concrete actions at home, at school, or online.</div><textarea id=\"act-en\" placeholder=\"I will... / I want to learn more about...\"></textarea></div>" +
    "<div><div class=\"lang-box lang-ja\"><div class=\"lang-lbl\">私にできること</div>家・学校・ネットでできる小さな一歩を書こう。</div><textarea id=\"act-ja\" placeholder=\"○○をやってみる / ○○について調べる\"></textarea></div>" +
    "</div>" +
    "<div class=\"summary-box\" style=\"margin-top:16px;\">" +
    "<p style=\"font-size:13px;font-weight:700;color:#3C3489;margin-bottom:10px;\">探究サマリー / Inquiry summary</p>" +
    "<div id=\"summary\" style=\"font-size:13px;color:#534AB7;line-height:1.85;\"></div>" +
    "</div>" +
    "<div class=\"teach-box\">" +
    "<strong>家に帰ったら、今日学んだことを家族に話してみよう!</strong><br>" +
    "Challenge: Can you explain today's theme to a family member in Japanese or English?" +
    "</div>" +
    "<div style=\"margin-top:14px;\"><button class=\"btn\" onclick=\"goStep(3)\">&larr; 戻る</button><button class=\"btn pri\" onclick=\"resetTheme()\">別のテーマを探究する &#8635;</button></div>";
  c.appendChild(s4);
}

function selSub(el) {
  document.querySelectorAll("#step-contents .chip").forEach(function(c) { c.classList.remove("on"); });
  el.classList.add("on");
  var val = decodeURIComponent(el.getAttribute("data-val"));
  document.getElementById("sub-explain").textContent = val;
}

function selStance(el) {
  document.querySelectorAll(".stance-btn").forEach(function(b) { b.classList.remove("chosen"); });
  el.classList.add("chosen");
  selStanceVal = el.getAttribute("data-val");
  document.getElementById("stance-exp").textContent = "Good choice! There is no single correct answer — your reasoning matters more than which stance you pick. どのスタンスも正解。大事なのは「なぜそう思うか」の理由です。";
}

function selSDG(el) {
  document.querySelectorAll("#step-contents .chip").forEach(function(c) { c.classList.remove("on"); });
  el.classList.add("on");
  selSdgVal = el.textContent;
  var val = decodeURIComponent(el.getAttribute("data-val"));
  document.getElementById("sdg-exp").textContent = val;
}

function buildSummary() {
  if (curTheme === null) return;
  var t = themes[curTheme];
  var myQ = (document.getElementById("my-q") || {}).value || "";
  var sr = (document.getElementById("stance-reason") || {}).value || "";
  var actEn = (document.getElementById("act-en") || {}).value || "";
  var actJa = (document.getElementById("act-ja") || {}).value || "";
  var html = "<strong>Theme:</strong> " + t.en + " (" + t.ja + ")<br>";
  if (myQ.trim()) html += "<strong>My question:</strong> " + myQ.trim() + "<br>";
  if (selStanceVal) html += "<strong>My stance:</strong> " + selStanceVal + "<br>";
  if (sr.trim()) html += "<strong>Why:</strong> " + sr.trim() + "<br>";
  if (selSdgVal) html += "<strong>SDG connection:</strong> " + selSdgVal + "<br>";
  if (actEn.trim()) html += "<strong>My action (EN):</strong> " + actEn.trim() + "<br>";
  if (actJa.trim()) html += "<strong>私のアクション:</strong> " + actJa.trim();
  if (!html.includes("<strong>My question")) html += "<span style=\"color:#999;\">前のステップを埋めてからここに来よう!</span>";
  document.getElementById("summary").innerHTML = html;
}
</script>
</body></html>
